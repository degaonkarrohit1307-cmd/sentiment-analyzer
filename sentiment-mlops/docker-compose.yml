# ── Assignment 9: Full Monitoring Stack (Docker Compose) ─────────────────────
# Starts the app + Prometheus + Grafana + EFK (Elasticsearch, Fluentd, Kibana)
#
# Run with:
#   docker-compose up -d
#
# Access:
#   App        → http://localhost:5000
#   Prometheus → http://localhost:9090
#   Grafana    → http://localhost:3000  (admin / admin)
#   Kibana     → http://localhost:5601

version: "3.8"

services:

  # ── Sentiment Analyzer App ──────────────────────────────────────────────────
  sentiment-analyzer:
    build: .
    container_name: sentiment-analyzer
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - MODEL_VERSION=v1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - mlops-network

  # ── Prometheus (Metrics Collection) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped
    networks:
      - mlops-network

  # ── Grafana (Metrics Dashboard) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - mlops-network

  # ── Elasticsearch (Log Storage) ──────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - mlops-network

  # ── Fluentd (Log Collector) ───────────────────────────────────────────────────
  fluentd:
    image: fluent/fluentd:v1.16-debian-1
    container_name: fluentd
    volumes:
      - ./monitoring/fluentd.conf:/fluentd/etc/fluent.conf
    ports:
      - "24224:24224"
    restart: unless-stopped
    depends_on:
      - elasticsearch
    networks:
      - mlops-network

  # ── Kibana (Log Dashboard) ────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    restart: unless-stopped
    depends_on:
      - elasticsearch
    networks:
      - mlops-network

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  mlops-network:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  grafana-storage:
  elasticsearch-data:
